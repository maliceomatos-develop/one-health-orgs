        let map, markerClusterGroup, currentSettingFilter = 'all', currentSpanFilter = 'all';

        const settingColors = {
            'Academia': '#3B82F6',
            'For-Profit': '#10B981',
            'Governmental': '#DC2626',
            'Intergovernmental': '#F59E0B',
            'Non-Profit': '#8B5CF6'
        };

        map = L.map('map').setView([39.8283, -98.5795], 5);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors',
            maxZoom: 19
        }).addTo(map);

        L.control.scale({
            position: 'bottomleft',
            imperial: true,
            metric: true
        }).addTo(map);

        function createOrgCard(loc) {
            const websiteHtml = loc.website ? 
                `<div class="org-field"><span class="org-label">Website:</span> <a href="${loc.website}" target="_blank" class="org-link">${loc.website}</a></div>` 
                : '';
            
            return `
                <div class="org-card">
                    <div class="org-title">${loc.name}</div>
                    <div class="org-field"><span class="org-label">Parent Organization:</span> <span class="org-value">${loc.parent}</span></div>
                    <div class="org-field"><span class="org-label">Setting:</span> <span class="org-value">${loc.setting}</span></div>
                    <div class="org-field"><span class="org-label">Geographical Span:</span> <span class="org-value">${loc.geographical_span}</span></div>
                    <div class="org-field"><span class="org-label">Nature:</span> <span class="org-value">${loc.nature}</span></div>
                    ${websiteHtml}
                </div>
            `;
        }

        function createMarkers() {
            if (markerClusterGroup) {
                map.removeLayer(markerClusterGroup);
            }
            
            markerClusterGroup = L.markerClusterGroup({
                maxClusterRadius: 50,
                spiderfyOnMaxZoom: true,
                showCoverageOnHover: false,
                zoomToBoundsOnClick: true
            });
            
            const filtered = locations.filter(loc => {
                const settingMatch = currentSettingFilter === 'all' || loc.setting === currentSettingFilter;
                const spanMatch = currentSpanFilter === 'all' || loc.geographical_span === currentSpanFilter;
                return settingMatch && spanMatch;
            });

            const coordGroups = {};
            filtered.forEach(loc => {
                const key = `${loc.lat.toFixed(4)},${loc.lng.toFixed(4)}`;
                if (!coordGroups[key]) {
                    coordGroups[key] = [];
                }
                coordGroups[key].push(loc);
            });

            Object.entries(coordGroups).forEach(([coordKey, orgs]) => {
                const firstOrg = orgs[0];
                const color = settingColors[firstOrg.setting] || '#6B7280';
                
                const icon = L.divIcon({
                    className: 'custom-marker',
                    html: `<div style="width: 18px; height: 18px; background-color: ${color}; border-radius: 50%; box-shadow: 0 2px 6px rgba(0,0,0,0.3);"></div>`,
                    iconSize: [18, 18],
                    iconAnchor: [9, 9]
                });

                const marker = L.marker([firstOrg.lat, firstOrg.lng], { icon });
                
                let popupContent = '';
                if (orgs.length > 1) {
                    popupContent = `<div class="multi-org-header">${orgs.length} Organizations at this Location</div>`;
                }
                popupContent += orgs.map(org => createOrgCard(org)).join('');
                
                marker.bindPopup(popupContent, { 
                    maxWidth: 400,
                    maxHeight: 450
                });
                
                markerClusterGroup.addLayer(marker);
            });

            map.addLayer(markerClusterGroup);
            
            document.getElementById('count').textContent = `${filtered.length} of ${locations.length} locations shown`;
            updateButtonCounts();
        }

        function updateButtonCounts() {
            const settingCounts = {};
            locations.forEach(loc => {
                settingCounts[loc.setting] = (settingCounts[loc.setting] || 0) + 1;
            });
            
            document.getElementById('setting-all').textContent = `All (${locations.length})`;
            document.getElementById('setting-academia').textContent = `Academia (${settingCounts['Academia'] || 0})`;
            document.getElementById('setting-forprofit').textContent = `For-Profit (${settingCounts['For-Profit'] || 0})`;
            document.getElementById('setting-governmental').textContent = `Governmental (${settingCounts['Governmental'] || 0})`;
            document.getElementById('setting-intergovernmental').textContent = `Intergovernmental (${settingCounts['Intergovernmental'] || 0})`;
            document.getElementById('setting-nonprofit').textContent = `Non-Profit (${settingCounts['Non-Profit'] || 0})`;
            
            const spanCounts = {};
            locations.forEach(loc => {
                spanCounts[loc.geographical_span] = (spanCounts[loc.geographical_span] || 0) + 1;
            });
            
            document.getElementById('span-all').textContent = `All (${locations.length})`;
            document.getElementById('span-local').textContent = `Local (${spanCounts['Local'] || 0})`;
            document.getElementById('span-state').textContent = `State (${spanCounts['State'] || 0})`;
            document.getElementById('span-national').textContent = `National (${spanCounts['National'] || 0})`;
            document.getElementById('span-international').textContent = `International (${spanCounts['International'] || 0})`;
        }

        function filterBySetting(setting) {
            currentSettingFilter = setting;
            
            document.querySelectorAll('[id^="setting-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById('setting-' + (setting === 'all' ? 'all' : setting.toLowerCase().replace('-', ''))).classList.add('active');
            
            createMarkers();
        }

        function filterBySpan(span) {
            currentSpanFilter = span;
            
            document.querySelectorAll('[id^="span-"]').forEach(btn => btn.classList.remove('active'));
            document.getElementById('span-' + (span === 'all' ? 'all' : span.toLowerCase())).classList.add('active');
            
            createMarkers();
        }

        function resetFilters() {
            currentSettingFilter = 'all';
            currentSpanFilter = 'all';
            
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('setting-all').classList.add('active');
            document.getElementById('span-all').classList.add('active');
            
            map.setView([39.8283, -98.5795], 5);
            createMarkers();
        }

        createMarkers();
    </script>
